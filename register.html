<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สมัครสมาชิก — DLTV Fund ระบบติดตามทุนการศึกษา</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;600;700;800&family=Sarabun:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--gold:#F5A623;--gold-deep:#F08C00;--ink:#2B2B33;--muted:#8A8F9E;--line:#EFE3CE;--err:#DC2626}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;color:var(--ink);min-height:100vh;display:flex;align-items:center;
  justify-content:center;padding:34px 16px;
  background:
    radial-gradient(900px 500px at 12% -10%, #FEE9C4 0%, transparent 60%),
    radial-gradient(700px 480px at 95% 110%, #FDEBCB 0%, transparent 55%),
    linear-gradient(150deg,#FFF9EF 0%,#FDF0DC 100%)}
.card{width:min(460px,100%);background:#fff;border-radius:18px;padding:34px 34px 26px;
  box-shadow:0 18px 60px rgba(140,95,10,.14)}
.logo{width:64px;height:64px;border-radius:14px;margin:0 auto 12px;
  background:linear-gradient(145deg,var(--gold),var(--gold-deep));color:#fff;
  font-family:'Noto Sans Thai';font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 16px rgba(240,140,0,.35)}
h1{font-family:'Noto Sans Thai';font-size:22px;text-align:center}
.hint{text-align:center;font-size:13px;color:var(--muted);margin:6px 0 20px;line-height:1.7}
label{display:block;font-family:'Noto Sans Thai';font-size:13.5px;font-weight:600;margin:13px 0 6px}
label small{font-weight:400;color:var(--muted)}
.field{position:relative}
input{width:100%;padding:12px 42px 12px 13px;border:1.5px solid #E5E0D4;border-radius:10px;font-size:14.5px;
  font-family:'Sarabun';background:#FCFBF8;transition:border-color .15s,box-shadow .15s}
input:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(245,166,35,.18);background:#fff}
.eye{position:absolute;right:6px;top:50%;transform:translateY(-50%);border:none;background:none;cursor:pointer;
  padding:7px;font-size:16px;opacity:.6;border-radius:8px}
.eye:hover{opacity:1;background:#F7F2E6}
.btn{width:100%;margin-top:22px;padding:13px;border:none;border-radius:12px;cursor:pointer;
  font-family:'Noto Sans Thai';font-size:16px;font-weight:700;color:#fff;
  background:linear-gradient(90deg,var(--gold),var(--gold-deep));box-shadow:0 8px 20px rgba(240,140,0,.35)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.msg{font-size:13px;margin-top:12px;min-height:19px;text-align:center;line-height:1.6}
.msg.err{color:var(--err)} .msg.ok{color:#15803D}
.back{display:block;text-align:center;margin-top:16px;font-size:13.5px;color:var(--gold-deep);
  font-weight:600;text-decoration:none}
.back:hover{text-decoration:underline}
.note{background:#FEF7E4;border:1px solid #F0DFB4;border-radius:10px;padding:10px 13px;font-size:12.5px;
  color:#7A6420;line-height:1.7;margin-top:16px}
</style>
</head>
<body>
<div class="card">
  <div class="logo">DLTV</div>
  <h1>สมัครสมาชิกนักเรียนทุน</h1>
  <p class="hint">กรอกข้อมูลให้ตรงกับทะเบียนนักเรียนทุน<br>เพื่อรับรหัสเข้าใช้งานระบบ</p>

  <label for="r-no">ลำดับนักเรียน <small>(ตามบัญชีรายชื่อนักเรียนทุน)</small></label>
  <input id="r-no" type="number" min="1" placeholder="เช่น 12" inputmode="numeric">

  <label for="r-name">ชื่อ - สกุลนักเรียนทุน</label>
  <input id="r-name" type="text" placeholder="เช่น กิตติศักดิ์ ใจดี" autocomplete="name">

  <label for="r-school">โรงเรียน</label>
  <input id="r-school" type="text" placeholder="ชื่อโรงเรียนปัจจุบัน">

  <label for="r-user">username <small>(a-z, 0-9 ความยาว 3–20 ตัว)</small></label>
  <input id="r-user" type="text" placeholder="เช่น kittisak12" autocomplete="username" autocapitalize="none">

  <label for="r-pass">password <small>(อย่างน้อย 6 ตัวอักษร)</small></label>
  <div class="field">
    <input id="r-pass" type="password" placeholder="ตั้งรหัสผ่าน" autocomplete="new-password">
    <button type="button" class="eye" data-for="r-pass" aria-label="แสดงรหัสผ่าน">👁️</button>
  </div>

  <label for="r-pass2">ยืนยัน password</label>
  <div class="field">
    <input id="r-pass2" type="password" placeholder="พิมพ์รหัสผ่านซ้ำอีกครั้ง" autocomplete="new-password">
    <button type="button" class="eye" data-for="r-pass2" aria-label="แสดงรหัสผ่าน">👁️</button>
  </div>

  <button class="btn" id="btn-reg">สมัครสมาชิก →</button>
  <div class="msg" id="msg"></div>

  <div class="note">🔒 ระบบจะตรวจ<b>ลำดับ</b>และ<b>ชื่อ-สกุล</b>ของคุณกับทะเบียนนักเรียนทุน
    หากไม่ตรงจะสมัครไม่ได้ — สะกดให้ตรงกับที่แจ้งไว้กับโครงการ และแต่ละคนสมัครได้ครั้งเดียว</div>

  <a class="back" href="login.html">← กลับไปหน้าเข้าสู่ระบบ</a>
</div>

<script src="firebase/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
(function(){
'use strict';
firebase.initializeApp(window.FIREBASE_CONFIG);
const auth = firebase.auth();
const db = firebase.firestore();
const msg = document.getElementById('msg');
function show(t, ok){ msg.textContent = t; msg.className = 'msg ' + (ok ? 'ok' : 'err'); }

// ตาดูรหัส
document.querySelectorAll('.eye').forEach(b => b.onclick = () => {
  const inp = document.getElementById(b.dataset.for);
  const s = inp.type === 'password';
  inp.type = s ? 'text' : 'password';
  b.textContent = s ? '🙈' : '👁️';
});

// เทียบชื่อแบบยืดหยุ่น: ตัดคำนำหน้า + ช่องว่าง
function normName(n){
  return String(n||'')
    .replace(/เด็กชาย|เด็กหญิง|ด\.ช\.|ด\.ญ\.|นางสาว|นาย|นาง/g,'')
    .replace(/\s+/g,'').trim();
}
function nameMatch(a, b){
  const x = normName(a), y = normName(b);
  if (!x || !y) return false;
  return x === y || (x.length >= 5 && (x.includes(y) || y.includes(x)));
}
function schoolOf(s){ return s.school_m3 || s.school || s.school_m1 || (s.school_m1_addr && s.school_m1_addr.name) || ''; }

document.getElementById('btn-reg').onclick = async () => {
  const no = parseInt(document.getElementById('r-no').value, 10);
  const name = document.getElementById('r-name').value.trim();
  const school = document.getElementById('r-school').value.trim();
  const username = document.getElementById('r-user').value.trim().toLowerCase();
  const pass = document.getElementById('r-pass').value;
  const pass2 = document.getElementById('r-pass2').value;

  if (!no || no < 1) return show('กรอกลำดับนักเรียนให้ถูกต้อง');
  if (!name) return show('กรอกชื่อ - สกุล');
  if (!school) return show('กรอกชื่อโรงเรียน');
  if (!/^[a-z0-9]{3,20}$/.test(username)) return show('username ต้องเป็น a-z หรือ 0-9 ยาว 3–20 ตัว');
  if (pass.length < 6) return show('รหัสผ่านต้องยาวอย่างน้อย 6 ตัวอักษร');
  if (pass !== pass2) return show('รหัสผ่านสองช่องไม่ตรงกัน');

  const btn = document.getElementById('btn-reg');
  btn.disabled = true; btn.textContent = 'กำลังสมัคร...';
  const email = username + '@dltvfund.web.app';

  try {
    // 1) เช็คก่อนสมัคร (อ่านได้แบบสาธารณะรายตัว)
    show('กำลังตรวจสอบข้อมูล...', true);
    if ((await db.collection('usernames').doc(username).get()).exists)
      throw { friendly: 'username นี้ถูกใช้แล้ว — ลองชื่ออื่น' };
    if ((await db.collection('registered').doc('no-' + no).get()).exists)
      throw { friendly: 'นักเรียนลำดับที่ ' + no + ' สมัครไปแล้ว — ถ้าลืมรหัสผ่านให้ติดต่อครูผู้ดูแลระบบ' };

    // 2) สร้างบัญชี (ล็อกอินอัตโนมัติ)
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    const uid = cred.user.uid;

    // 3) ตรวจกับทะเบียนนักเรียนทุน (ตอนนี้ล็อกอินแล้วจึงอ่าน students ได้)
    let roster = null;
    const q = await db.collection('students').where('no', '==', no).limit(1).get();
    if (!q.empty) roster = q.docs[0].data();
    if (!roster || !nameMatch(name, roster.name)) {
      await cred.user.delete();     // ยกเลิกบัญชีที่เพิ่งสร้าง
      throw { friendly: !roster
        ? 'ไม่พบนักเรียนลำดับที่ ' + no + ' ในทะเบียน — ตรวจลำดับอีกครั้ง'
        : 'ชื่อ-สกุลไม่ตรงกับทะเบียนของลำดับที่ ' + no + ' — สะกดให้ตรงกับที่แจ้งโครงการ' };
    }

    // 4) บันทึกระเบียนบัญชี + จอง username + จองลำดับ
    await db.collection('accounts').doc(uid).set({
      studentId: String(roster.id), no: roster.no, name: roster.name,
      school: schoolOf(roster) || school, username, email,
      mustChangePassword: false, role: 'student', selfRegistered: true,
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection('usernames').doc(username).set({ email });
    await db.collection('registered').doc('no-' + no).set({
      username, uid, at: firebase.firestore.FieldValue.serverTimestamp()
    });
    await db.collection('loginLogs').add({
      uid, email, username, name: roster.name,
      at: firebase.firestore.FieldValue.serverTimestamp(),
      ua: 'สมัครสมาชิกใหม่ · ' + navigator.userAgent.slice(0, 120)
    }).catch(()=>{});

    show('✅ สมัครสำเร็จ! กำลังพาเข้าสู่ระบบ...', true);
    setTimeout(() => location.replace('index.html'), 900);

  } catch (e) {
    // เผื่อสมัคร Auth สำเร็จแต่ขั้นถัดไปพัง → ออกจากระบบไว้ก่อน
    if (auth.currentUser && !e.friendly) { try { await auth.currentUser.delete(); } catch(_){ await auth.signOut(); } }
    show(e.friendly || ({
      'auth/email-already-in-use': 'username นี้ถูกใช้แล้ว — ลองชื่ออื่น',
      'auth/weak-password': 'รหัสผ่านง่ายเกินไป',
      'auth/network-request-failed': 'เชื่อมต่ออินเทอร์เน็ตไม่ได้',
      'permission-denied': 'ระบบยังไม่พร้อม (Security Rules) — แจ้งผู้ดูแลระบบ',
    })[e.code] || e.message || 'เกิดข้อผิดพลาด ลองใหม่อีกครั้ง');
  } finally {
    btn.disabled = false; btn.textContent = 'สมัครสมาชิก →';
  }
};
})();
</script>
</body>
</html>
