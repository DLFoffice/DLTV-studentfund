<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ตรวจสอบสิทธิ์ระบบ — DLTV Fund</title>
<style>
body{font-family:'Sarabun',sans-serif;background:#FFF9EF;max-width:680px;margin:36px auto;padding:0 16px;color:#2B2B33}
h1{font-family:'Noto Sans Thai',sans-serif;font-size:20px}
.card{background:#fff;border-radius:14px;padding:20px 22px;box-shadow:0 4px 18px rgba(150,110,20,.08);margin-bottom:14px}
#out{font-family:monospace;font-size:13px;line-height:1.9;white-space:pre-wrap}
.ok{color:#15803D}.bad{color:#DC2626}.warn{color:#B45309}
button{border:none;border-radius:10px;padding:10px 18px;font-family:'Noto Sans Thai';font-weight:700;font-size:14px;
cursor:pointer;color:#fff;background:linear-gradient(90deg,#F5A623,#F08C00)}
.diag{background:#FEF3C7;border:1px solid #f0d47a;border-radius:10px;padding:12px 14px;font-size:14px;line-height:1.8;margin-top:10px;display:none}
</style>
</head>
<body>
<h1>🔍 ตรวจสอบสิทธิ์ระบบ (สำหรับวินิจฉัยปัญหา)</h1>
<div class="card">
  <p style="font-size:13.5px;color:#8A8F9E;margin:0 0 12px">
    ล็อกอินด้วยบัญชีที่มีปัญหา (เช่น บัญชีนักเรียน) แล้วกดปุ่มตรวจ — ระบบจะทดสอบสิทธิ์ทีละขั้นและสรุปสาเหตุให้
  </p>
  <button id="run">▶ เริ่มตรวจสอบ</button>
  <div id="out" style="margin-top:14px">ยังไม่ได้ตรวจ</div>
  <div class="diag" id="diag"></div>
</div>

<script src="firebase/firebase-config.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp(window.FIREBASE_CONFIG);
const auth = firebase.auth(), db = firebase.firestore();
const out = document.getElementById('out'), diag = document.getElementById('diag');
function line(t, cls){ const d=document.createElement('div'); if(cls)d.className=cls; d.textContent=t; out.appendChild(d); }

auth.onAuthStateChanged(u => { if (!u) location.replace('login.html'); });

document.getElementById('run').onclick = async () => {
  out.innerHTML=''; diag.style.display='none';
  const u = auth.currentUser;
  if (!u) { line('ยังไม่ได้ล็อกอิน','bad'); return; }
  line('บัญชี: ' + u.email);
  line('uid: ' + u.uid);

  const r = {};  // ผลการทดสอบ

  // 1) อ่านระเบียนบัญชีตัวเอง
  let acc = null;
  try {
    const d = await db.collection('accounts').doc(u.uid).get();
    acc = d.exists ? d.data() : null;
    r.acc = true;
    line('1) อ่าน accounts ของตัวเอง: ✓' + (acc
      ? '  role=' + acc.role + '  studentId=' + JSON.stringify(acc.studentId) + ' (ชนิด: ' + typeof acc.studentId + ')'
      : '  (ไม่มีระเบียน — บัญชีครู/แอดมิน)'), 'ok');
  } catch(e) { r.acc = false; line('1) อ่าน accounts: ✗ ' + e.code, 'bad'); }

  const sid = acc && acc.studentId != null ? String(acc.studentId) : null;

  // 2) อ่านเอกสารนักเรียนของตัวเอง
  if (sid) {
    try {
      const d = await db.collection('students').doc(sid).get();
      r.readOwn = true; r.ownExists = d.exists;
      line('2) อ่าน students/' + sid + ': ✓ ' + (d.exists
        ? '(พบเอกสาร — id ในเอกสาร=' + JSON.stringify(d.data().id) + ')'
        : '(เอกสารไม่พบ!)'), d.exists ? 'ok' : 'warn');
    } catch(e) { r.readOwn = false; line('2) อ่าน students/' + sid + ': ✗ ' + e.code, 'bad'); }

    // 3) เขียนเอกสารตัวเอง (ฟิลด์ทดสอบ ไม่กระทบข้อมูล)
    try {
      await db.collection('students').doc(sid).set({ _permTest: Date.now() }, { merge: true });
      r.writeOwn = true;
      line('3) เขียน students/' + sid + ': ✓', 'ok');
    } catch(e) { r.writeOwn = false; line('3) เขียน students/' + sid + ': ✗ ' + e.code, 'bad'); }
  } else {
    line('2-3) ข้าม (บัญชีนี้ไม่มี studentId)', 'warn');
  }

  // 4) ลองอ่านข้อมูลนักเรียน "ทั้งชุด" — นักเรียนต้องทำไม่ได้ ถ้าทำได้แปลว่า Rules ยังไม่ใช่ v4
  try {
    await db.collection('students').limit(2).get();
    r.readAll = true;
    line('4) อ่านรายชื่อทั้งชุด: ทำได้', acc && acc.role==='student' ? 'warn' : 'ok');
  } catch(e) { r.readAll = false; line('4) อ่านรายชื่อทั้งชุด: ถูกปฏิเสธ (' + e.code + ')', acc && acc.role==='student' ? 'ok' : 'bad'); }

  // ───── สรุปวินิจฉัย ─────
  diag.style.display = 'block';
  const isStu = acc && acc.role === 'student';
  if (isStu) {
    if (r.readOwn && r.writeOwn && !r.readAll) {
      diag.innerHTML = '✅ <b>สิทธิ์ถูกต้องครบทุกข้อ</b> — Rules v4 ทำงานสมบูรณ์<br>' +
        'ถ้าก่อนหน้านี้เคยขึ้น error แปลว่าเป็นช่วง Rules กำลัง propagate (ใช้เวลา ~1 นาทีหลัง Publish) ตอนนี้ใช้งานได้ปกติแล้ว';
    } else if (!r.readOwn || !r.writeOwn) {
      diag.innerHTML = '❌ <b>สาเหตุ: studentId ในบัญชีไม่ตรงกับรหัสเอกสารนักเรียน</b><br>' +
        'บัญชีนี้ผูกกับ studentId = <code>' + sid + '</code> แต่เข้าถึงเอกสาร students/' + sid + ' ไม่ได้<br>' +
        '<b>วิธีแก้:</b> เปิด Firebase Console → Firestore → collection <code>accounts</code> → เอกสาร uid <code>' + u.uid + '</code><br>' +
        '1. ตรวจว่าฟิลด์ <code>studentId</code> เป็นชนิด <b>string</b> (ไม่ใช่ number) และค่าตรงกับ Document ID ใน collection <code>students</code> ของนักเรียนคนนี้เป๊ะๆ<br>' +
        '2. ถ้าไม่ตรง แก้ค่าให้ตรงแล้วให้นักเรียนรีเฟรชแอป';
      if (r.readAll) diag.innerHTML += '<br><br>⚠️ และการอ่านทั้งชุด "ทำได้" — แปลว่า <b>Rules ที่ Publish อยู่ไม่ใช่เวอร์ชัน v4</b> ให้วางไฟล์ firestore.rules ล่าสุดแล้ว Publish อีกครั้ง';
    } else if (r.readAll) {
      diag.innerHTML = '⚠️ <b>Rules ที่ใช้งานอยู่ไม่ใช่ v4</b> (นักเรียนยังอ่านข้อมูลทุกคนได้)<br>' +
        'เปิด Firebase Console → Firestore → Rules → ตรวจว่าเนื้อหาตรงกับไฟล์ <code>firebase/firestore.rules</code> แล้วกด <b>Publish</b> และรอ ~1 นาที';
    }
  } else {
    diag.innerHTML = (r.readAll ? '✅ บัญชีครู/แอดมิน: สิทธิ์ปกติ' : '❌ บัญชีครู/แอดมินอ่านข้อมูลไม่ได้ — Rules มีปัญหา ให้วาง v4 ใหม่แล้ว Publish');
  }
};
</script>
</body>
</html>
